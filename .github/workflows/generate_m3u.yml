name: Génération automatique du fichier M3U enrichi

on:
  workflow_dispatch:   # lancement manuel
  schedule:
    - cron: "0 10 * * 1"   # chaque lundi à 10h UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v3

      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Exécution du script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          echo "🚀 Lancement du script d'enrichissement..."
          python main.py
          echo "✅ Fichier M3U généré avec succès"

      - name: Commit et push des fichiers
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add vod_enriched_from_server.m3u tmdb_cache.json
          git commit -m "Mise à jour automatique du fichier M3U enrichi" || echo "Aucune modification à committer"
          git pull --rebase origin main || echo "Pas de mise à jour distante"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
