name: Génération automatique du fichier M3U

on:
  schedule:
    - cron: '0 10 * * 1'  # chaque lundi à 10h UTC
  workflow_dispatch:      # exécution manuelle possible

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v3

      - name: Configuration Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Exécution du script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python main.py
          echo "✅ Fichier M3U généré avec succès"

      - name: Commit et push du fichier M3U
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add vod_enriched.m3u
          git commit -m "Mise à jour automatique du fichier M3U" || echo "Aucune modification à committer"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

